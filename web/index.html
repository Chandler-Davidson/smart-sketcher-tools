<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Sketcher Sender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <main class="app-shell">
      <header>
        <h1>Projector Quick Send</h1>
        <p>Paste an image link or upload a file, then send to your smART Sketcher in one click.</p>
      </header>

      <section class="card source-card">
        <h2>1) Choose Image</h2>
        <div class="toggle-row">
          <button id="mode-url" class="toggle-btn active" type="button">Image Link</button>
          <button id="mode-upload" class="toggle-btn" type="button">Upload File</button>
        </div>

        <div id="panel-url" class="panel active">
          <label for="image-url">Image URL</label>
          <input id="image-url" type="url" placeholder="https://example.com/my-image.jpg" />
        </div>

        <div id="panel-upload" class="panel">
          <label for="image-file">Image File</label>
          <input id="image-file" type="file" accept="image/*" />
          <p style="font-size: 0.85rem; color: #888; margin-top: 0.5rem;">💡 Tip: You can also paste images directly from your clipboard (Ctrl+V)</p>
        </div>

        <div class="options-grid">
          <div>
            <label for="fit-mode">Fit Mode</label>
            <select id="fit-mode">
              <option value="contain" selected>Preserve aspect ratio (pad)</option>
              <option value="stretch">Stretch to fill</option>
            </select>
          </div>
          <div>
            <label for="address">Device Address (optional)</label>
            <input id="address" type="text" placeholder="1C:69:20:DB:3E:C6" />
            <p id="device-hint" class="device-hint"></p>
          </div>
        </div>

        <div class="button-row">
          <button id="discover-btn" class="ghost" type="button">Auto-discover device</button>
          <button id="send-btn" class="accent" type="button">Send to Projector</button>
        </div>
      </section>

      <section class="card preview-card">
        <h2>2) Preview</h2>
        <div class="preview-wrap">
          <img id="preview" alt="Image preview" />
          <div id="preview-empty">Preview will appear here</div>
        </div>
      </section>

      <section class="card status-card">
        <h2>3) Transfer Status</h2>
        <p id="status-text">Ready</p>
        <div class="progress-track">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="line-count">0 / 128 lines</p>
      </section>
    </main>

    <script src="/web/app.js"></script>
  </body>
</html>
